name: Build vLLM + ROCm
on:
  workflow_dispatch:
    inputs:
      gfx_target:
        description: 'AMD GPU targets (comma-separated)'
        required: false
        default: 'gfx110X,gfx1151,gfx1150,gfx120X'
      create_release:
        description: 'Create a GitHub release after successful build'
        required: false
        default: true
        type: boolean

  pull_request:
    types: [opened, synchronize, reopened]

  schedule:
    - cron: '0 15 * * 0'

env:
  GFX_TARGETS: ${{ github.event.inputs.gfx_target || 'gfx110X,gfx1151,gfx1150,gfx120X' }}

jobs:
  prepare-matrix:
    runs-on: ubuntu-22.04
    outputs:
      ubuntu_matrix: ${{ steps.set-matrix.outputs.ubuntu_matrix }}
    steps:
    - name: Set matrix
      id: set-matrix
      run: |
        targets="${{ env.GFX_TARGETS }}"
        matrix_targets=$(echo "$targets" \
          | tr ',' '\n' \
          | sed 's/^ *//;s/ *$//' \
          | jq -R . \
          | jq -s '{gfx_target: .}' \
          | jq -c)
        echo "ubuntu_matrix=$matrix_targets" >> $GITHUB_OUTPUT
        echo "Generated matrix: $matrix_targets"

  build-ubuntu:
    runs-on: ubuntu-22.04
    needs: prepare-matrix
    strategy:
      matrix: ${{fromJson(needs.prepare-matrix.outputs.ubuntu_matrix)}}
      fail-fast: false
    outputs:
      vllm_version: ${{ steps.set-outputs.outputs.vllm_version }}
      torch_version: ${{ steps.set-outputs.outputs.torch_version }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download portable Python 3.12 (python-build-standalone)
      run: |
        # Use astral-sh/python-build-standalone for a relocatable Python
        # that works across Linux distros without system Python dependency.
        PBS_TAG="20250604"
        PBS_URL="https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}/cpython-3.12.11+${PBS_TAG}-x86_64-unknown-linux-gnu-install_only.tar.gz"
        echo "Downloading portable Python from $PBS_URL"
        # Extracts to python/ — move to /opt/vllm so it becomes the release root
        curl -fsSL "$PBS_URL" | tar -xz -C /opt
        mv /opt/python /opt/vllm
        /opt/vllm/bin/python3.12 --version
        echo "Portable Python installed at /opt/vllm"

    - name: Map GPU target to AMD wheel URLs
      id: wheel-urls
      run: |
        target="${{ matrix.gfx_target }}"

        # Map targets to AMD wheel URL suffixes
        # See: https://rocm.docs.amd.com/en/latest/rocm-for-ai/vllm.html
        case "$target" in
          gfx110X) suffix="gfx110X-all" ;;
          gfx1151) suffix="gfx1151" ;;
          gfx1150) suffix="gfx1150" ;;
          gfx120X) suffix="gfx120X-all" ;;
          *)
            echo "ERROR: No AMD pre-built wheels for target: $target"
            exit 1
            ;;
        esac

        echo "torch_index=https://repo.amd.com/rocm/whl/${suffix}/" >> $GITHUB_OUTPUT
        echo "vllm_index=https://rocm.frameworks.amd.com/whl/${suffix}/" >> $GITHUB_OUTPUT
        echo "Using PyTorch index: https://repo.amd.com/rocm/whl/${suffix}/"
        echo "Using vLLM index: https://rocm.frameworks.amd.com/whl/${suffix}/"

    - name: Prepare Python environment
      run: |
        # No venv needed — install packages directly into the standalone Python.
        /opt/vllm/bin/python3 -m pip install --upgrade pip
        echo "Python: $(/opt/vllm/bin/python3 --version)"

    - name: Install PyTorch ROCm from AMD
      run: |
        echo "Installing PyTorch from AMD ROCm wheel index..."
        /opt/vllm/bin/pip install \
          --index-url "${{ steps.wheel-urls.outputs.torch_index }}" \
          torch torchvision
        /opt/vllm/bin/python3 -c "
        import torch
        print(f'PyTorch {torch.__version__}')
        print(f'ROCm built-in: {torch.version.hip is not None}')
        "

    - name: Install vLLM ROCm (official wheel with ROCm native extensions)
      run: |
        echo "Installing vLLM from official ROCm wheel index..."
        /opt/vllm/bin/pip install \
          --extra-index-url https://wheels.vllm.ai/rocm/ \
          vllm
        echo "vLLM installed (import check deferred until after torch reinstall)"

    - name: Reinstall AMD PyTorch ROCm (compatible with pip ROCm SDK)
      run: |
        # vLLM's prebuilt native extensions (_C.abi3.so / _rocm_C.abi3.so) are
        # linked against the exact torch RELEASE the wheel was built with. We
        # swap in AMD's ROCm torch (for the bundled ROCm SDK libs/amdsmi), but
        # it MUST be the same release vLLM pinned. Installing a newer torch
        # (e.g. 2.11, whose C++ ABI renamed c10::hip::* -> c10::cuda::*) yields
        # "undefined symbol" load failures — the exact break that shipped in
        # vllm0.21.0-rocm7.13.0. Tier 0 of the qualification suite guards this.
        REQ_TORCH=$(/opt/vllm/bin/python3 -c "
        import glob, re
        for meta in glob.glob('/opt/vllm/lib/python3.12/site-packages/vllm-*.dist-info/METADATA'):
            for line in open(meta, encoding='utf-8', errors='replace'):
                if line.startswith('Requires-Dist:') and 'torch' in line:
                    m = re.search(r'torch\s*==\s*([0-9]+(?:\.[0-9]+)*)', line)
                    if m:
                        print(m.group(1)); raise SystemExit
        ")
        if [ -n "$REQ_TORCH" ]; then
          PIN="torch==${REQ_TORCH}"
        else
          echo "WARNING: could not determine vLLM's torch pin; falling back to latest"
          PIN="torch"
        fi
        echo "Reinstalling AMD torch ($PIN) to match bundled ROCm SDK libraries..."
        /opt/vllm/bin/pip install --force-reinstall --no-deps \
          --index-url "${{ steps.wheel-urls.outputs.torch_index }}" \
          "$PIN"

        # Remove the vLLM-bundled amdsmi (v26.2.2 from ROCm 7.2.1) —
        # it conflicts with the AMD pip ROCm SDK amdsmi (v26.3.0).
        # The ROCm SDK version in _rocm_sdk_core/share/amd_smi/ is used instead.
        SP="/opt/vllm/lib/python3.12/site-packages"
        rm -rf $SP/amdsmi $SP/amdsmi-*.dist-info

        for libdir in $SP/_rocm_sdk_*/lib $SP/torch/lib; do
          [ -d "$libdir" ] && LD_LIBRARY_PATH="${libdir}:${LD_LIBRARY_PATH:-}"
        done
        export LD_LIBRARY_PATH
        /opt/vllm/bin/python3 -c "
        import torch; print(f'PyTorch {torch.__version__}')
        import vllm; print(f'vLLM {vllm.__version__}')
        print('Both imports OK')
        "

    - name: Pre-compile Triton HIP utilities (eliminates gcc dependency)
      run: |
        SP="/opt/vllm/lib/python3.12/site-packages"
        TRITON_AMD="$SP/triton/backends/amd"
        for libdir in $SP/_rocm_sdk_*/lib $SP/torch/lib; do
          [ -d "$libdir" ] && LD_LIBRARY_PATH="${libdir}:${LD_LIBRARY_PATH:-}"
        done
        export LD_LIBRARY_PATH

        # Create unversioned symlinks for ROCm libs (pip installs only have versioned .so.N)
        ROCM_LIB="$SP/_rocm_sdk_core/lib"
        for lib in "$ROCM_LIB"/*.so.*; do
          name=$(basename "$lib")
          link="$ROCM_LIB/${name%%.*}.so"
          [ ! -e "$link" ] && ln -sf "$name" "$link"
        done
        ls -la "$ROCM_LIB/libamdhip64.so" || echo "WARNING: symlink not created"

        # Compile the hip_utils C module with gcc directly and save into the package.
        # We can't use Triton's compile_module_from_src because it also tries to
        # dlopen the HIP library, which doesn't work on headless CI.
        TRITON_AMD="$SP/triton/backends/amd"
        PYTHON_INC="/opt/vllm/include/python3.12"

        # Generate the C source with the HIP library path baked in
        /opt/vllm/bin/python3 -c "
        from pathlib import Path
        import os
        dirname = '$TRITON_AMD'
        src = Path(os.path.join(dirname, 'driver.c')).read_text()
        # Bake in the relative path that will resolve at runtime via LD_LIBRARY_PATH
        src = src.replace('/*py_libhip_search_path*/', 'libamdhip64.so', 1)
        Path('/tmp/hip_utils.c').write_text(src)
        print('Generated /tmp/hip_utils.c')
        "

        # Compile with gcc
        gcc /tmp/hip_utils.c -O3 -shared -fPIC -Wno-psabi \
          -o "$TRITON_AMD/hip_utils_prebuilt.so" \
          -I"$TRITON_AMD/include" \
          -I"$PYTHON_INC"
        echo "Pre-compiled: $TRITON_AMD/hip_utils_prebuilt.so ($(stat -c%s "$TRITON_AMD/hip_utils_prebuilt.so") bytes)"

        # Patch Triton to load the pre-built .so instead of JIT-compiling
        DRIVER_PY="$TRITON_AMD/driver.py"
        sed -i 's|mod = compile_module_from_src(src=src, name="hip_utils", include_dirs=include_dirs)|_pso = os.path.join(dirname, "hip_utils_prebuilt.so")\n        if os.path.exists(_pso):\n            import importlib.util as _ilu\n            _sp = _ilu.spec_from_file_location("hip_utils", _pso)\n            mod = _ilu.module_from_spec(_sp)\n            _sp.loader.exec_module(mod)\n        else:\n            mod = compile_module_from_src(src=src, name="hip_utils", include_dirs=include_dirs)|' "$DRIVER_PY"
        /opt/vllm/bin/python3 -c "import ast; ast.parse(open('$DRIVER_PY').read()); print('Patched driver.py — syntax OK')"

    - name: Create launcher script
      run: |
        cat > /opt/vllm/bin/vllm-server << 'LAUNCHER_EOF'
        #!/bin/bash
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        VENV_DIR="$(dirname "$SCRIPT_DIR")"
        SP="$VENV_DIR/lib/python3.12/site-packages"
        # Add all bundled ROCm library paths
        for libdir in "$SP"/_rocm_sdk_*/lib "$SP"/torch/lib; do
        [ -d "$libdir" ] && LD_LIBRARY_PATH="${libdir}:${LD_LIBRARY_PATH:-}"
        done
        # Also add LLVM lib for the bundled clang
        LD_LIBRARY_PATH="$SP/_rocm_sdk_core/lib/llvm/lib:${LD_LIBRARY_PATH}"
        export LD_LIBRARY_PATH
        export PYTHONPATH="$SP/_rocm_sdk_core/share/amd_smi:${PYTHONPATH:-}"
        export FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE
        # Use bundled clang for Triton JIT (no system gcc needed)
        CLANG="$SP/_rocm_sdk_core/lib/llvm/bin/clang"
        [ -f "$CLANG" ] && chmod +x "$CLANG" "$CLANG"-22 2>/dev/null
        export CC="$CLANG"
        exec "$SCRIPT_DIR/python3" -m vllm.entrypoints.openai.api_server "$@"
        LAUNCHER_EOF

        # Remove YAML indentation from heredoc
        sed -i 's/^        //' /opt/vllm/bin/vllm-server
        chmod +x /opt/vllm/bin/vllm-server
        echo "Launcher script:"
        cat /opt/vllm/bin/vllm-server

    - name: Strip unnecessary files to reduce size
      run: |
        cd /opt/vllm
        echo "=== Size before cleanup ==="
        du -sh .

        SP="lib/python3.12/site-packages"

        # Remove pip/wheel (keep setuptools — torch.utils.cpp_extension needs it)
        rm -rf $SP/pip* $SP/wheel* 2>/dev/null || true

        # Remove __pycache__ and .pyc
        find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
        find . -name "*.pyc" -delete 2>/dev/null || true

        # Remove test/benchmark dirs (but NOT torch.testing — it's imported at runtime)
        rm -rf $SP/torch/test $SP/torch/benchmarks 2>/dev/null || true

        # Remove packages not needed for inference serving (~500MB)
        rm -rf $SP/pyarrow* $SP/opencv* $SP/cv2* 2>/dev/null || true
        rm -rf $SP/onnx* $SP/pandas* $SP/plotly* 2>/dev/null || true
        rm -rf $SP/datasets* $SP/evaluate* $SP/peft* $SP/timm* 2>/dev/null || true
        rm -rf $SP/boto3* $SP/botocore* $SP/s3transfer* 2>/dev/null || true
        rm -rf $SP/azure* $SP/google_cloud* $SP/google_auth* $SP/msal* 2>/dev/null || true
        rm -rf $SP/tensorizer* $SP/runai* 2>/dev/null || true
        rm -rf $SP/aiter_meta* 2>/dev/null || true

        # Trim LLVM toolchain: keep only clang + its libs (~350MB saved)
        LLVM="$SP/_rocm_sdk_core/lib/llvm"
        # Keep the clang driver and ITS versioned binary (clang-NN). The driver
        # ("clang") execs "clang-<major>", and the LLVM major version tracks the
        # ROCm release (22 -> 23 at ROCm 7.13). Hardcoding clang-22 deletes the
        # real compiler on newer ROCm and breaks Triton's runtime JIT (no kernel
        # can compile -> server fails to start). Match clang-* so it survives.
        find "$LLVM/bin" -type f ! -name "clang" ! -name "clang-*" -delete 2>/dev/null || true
        find "$LLVM/bin" -type l ! -name "clang" -delete 2>/dev/null || true
        # Keep only libs that clang needs (libclang-cpp, libLLVM, rocm_sysdeps)
        find "$LLVM/lib" -name "*.so*" \
          ! -name "libclang-cpp*" \
          ! -name "libLLVM*" \
          -delete 2>/dev/null || true
        rm -rf "$LLVM/lib/clang/"*/include/cuda_wrappers 2>/dev/null || true

        # Trim ROCm SDK bin/ (Python wrapper scripts, not needed)
        rm -rf "$SP/_rocm_sdk_core/bin" 2>/dev/null || true

        # Remove Python stdlib we don't need
        rm -rf lib/python3.12/test lib/python3.12/tkinter lib/python3.12/idlelib 2>/dev/null || true
        rm -rf lib/python3.12/turtledemo lib/python3.12/ensurepip 2>/dev/null || true
        # Keep include/ — Triton JIT needs Python.h headers

        # Ensure bundled clang is executable (permissions lost during tar)
        chmod +x "$LLVM/bin/clang"* 2>/dev/null || true

        # NOTE: Do NOT strip .so files — AMD ROCm wheels use special ELF
        # alignment that strip corrupts, and numpy/scipy also break.

        echo "=== Size after cleanup ==="
        du -sh .
        echo ""
        echo "Top consumers:"
        du -sh $SP/torch/ $SP/vllm/ $SP/_rocm_sdk_core/ $SP/aiter/ $SP/triton/ 2>/dev/null || true

    - name: Verify bundled environment works
      run: |
        SP="/opt/vllm/lib/python3.12/site-packages"
        for libdir in $SP/_rocm_sdk_*/lib $SP/torch/lib; do
          [ -d "$libdir" ] && LD_LIBRARY_PATH="${libdir}:${LD_LIBRARY_PATH:-}"
        done
        export LD_LIBRARY_PATH

        /opt/vllm/bin/python3 -c "import vllm; print(f'vLLM {vllm.__version__} OK')"
        /opt/vllm/bin/python3 -c "import torch; print(f'PyTorch {torch.__version__} OK')"
        /opt/vllm/bin/python3 -c "
        # Verify native extensions exist (they load only with GPU present)
        import os, pathlib
        sp = pathlib.Path('$SP/vllm')
        for ext in ['_C.abi3.so', '_rocm_C.abi3.so']:
            p = sp / ext
            assert p.exists(), f'Missing {ext}'
            print(f'{ext}: {p.stat().st_size // 1048576} MB')
        print('Native extensions verified')
        "
        bash -n /opt/vllm/bin/vllm-server
        echo "All sanity checks passed"

    # Tier 0 — static bundle qualification (report-only for now; does not gate
    # the build). Emits a dashboard-friendly JSON fragment. This is the check
    # that would have caught the vllm0.21.0 torch-ABI mismatch at build time.
    - name: Tier 0 — static qualification
      continue-on-error: true
      run: |
        python3 scripts/qualify/tier0_static.py \
          --bundle-root /opt/vllm \
          --gfx-target "${{ matrix.gfx_target }}" \
          --output "tier0-${{ matrix.gfx_target }}.json"

    - name: Upload Tier 0 report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: tier0-report-${{ matrix.gfx_target }}
        path: tier0-${{ matrix.gfx_target }}.json
        retention-days: 30
        if-no-files-found: warn

    - name: Report final size
      run: |
        echo "=== Final artifact ==="
        du -sh /opt/vllm/
        echo ""
        du -sh /opt/vllm/*/ 2>/dev/null

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vllm-ubuntu-rocm-${{ matrix.gfx_target }}-x64
        path: /opt/vllm/
        retention-days: 30
        compression-level: 6

    - name: Set job outputs
      id: set-outputs
      run: |
        SP="/opt/vllm/lib/python3.12/site-packages"
        for libdir in $SP/_rocm_sdk_*/lib $SP/torch/lib; do
          [ -d "$libdir" ] && LD_LIBRARY_PATH="${libdir}:${LD_LIBRARY_PATH:-}"
        done
        export LD_LIBRARY_PATH

        vllm_ver=$(/opt/vllm/bin/python3 -c "import vllm; print(vllm.__version__)")
        torch_ver=$(/opt/vllm/bin/python3 -c "import torch; print(torch.__version__)")
        echo "vllm_version=$vllm_ver" >> $GITHUB_OUTPUT
        echo "torch_version=$torch_ver" >> $GITHUB_OUTPUT

    - name: Clean up
      if: always()
      run: |
        [ -d "/opt/vllm" ] && sudo rm -rf /opt/vllm

  # ======================================================================
  # Shared release metadata. build-ubuntu's outputs are identical across
  # matrix legs (same vLLM/torch; only the gfx target differs), so reading
  # them in a single job is reliable and avoids matrix-output ambiguity.
  # ======================================================================
  compute-meta:
    needs: [build-ubuntu]
    runs-on: ubuntu-22.04
    if: always() && needs.build-ubuntu.result == 'success'
    outputs:
      vllm_version: ${{ needs.build-ubuntu.outputs.vllm_version }}
      torch_version: ${{ needs.build-ubuntu.outputs.torch_version }}
      rocm: ${{ steps.meta.outputs.rocm }}
    steps:
      - id: meta
        run: |
          TORCH_VERSION="${{ needs.build-ubuntu.outputs.torch_version }}"
          ROCM_VERSION=$(echo "$TORCH_VERSION" | grep -oP 'rocm[\d.]+' || echo "rocm")
          echo "rocm=$ROCM_VERSION" >> "$GITHUB_OUTPUT"

  # ======================================================================
  # Publish each target as a PRERELEASE first. Qualification (below) then
  # promotes to a full release only on pass. Failing builds stay prerelease:
  # downloadable for debugging, but skipped by `gh ... /releases/latest`,
  # which is how lemonade auto-discovers a release — so an unqualified build
  # is never auto-picked.
  # ======================================================================
  publish-prerelease:
    needs: [prepare-matrix, build-ubuntu, compute-meta]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      matrix: ${{fromJson(needs.prepare-matrix.outputs.ubuntu_matrix)}}
      fail-fast: false
    if: |
      always() &&
      needs.build-ubuntu.result == 'success' &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == null) ||
       github.event_name == 'schedule')
    steps:
      - name: Download build artifact for ${{ matrix.gfx_target }}
        uses: actions/download-artifact@v4
        with:
          name: vllm-ubuntu-rocm-${{ matrix.gfx_target }}-x64
          path: ./artifact

      - name: Package + create prerelease
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          TAG="vllm${{ needs.compute-meta.outputs.vllm_version }}-${{ needs.compute-meta.outputs.rocm }}-${{ matrix.gfx_target }}"
          MAX_SIZE=1900  # MB — GitHub limit is 2 GB per asset
          base="${TAG}-x64"

          echo "Creating: ${base}.tar.gz"
          tar -czf "${base}.tar.gz" -C ./artifact .
          size_mb=$(du -m "${base}.tar.gz" | cut -f1)
          echo "Archive size: ${size_mb} MB"

          if [ "$size_mb" -gt "$MAX_SIZE" ]; then
            echo "Splitting into ${MAX_SIZE}MB parts..."
            split -b ${MAX_SIZE}M --numeric-suffixes=1 -a 2 \
              --additional-suffix=.tar.gz \
              "${base}.tar.gz" "${base}.part"
            rm "${base}.tar.gz"
            parts=( "${base}".part*.tar.gz )
            total=${#parts[@]}
            total_padded=$(printf "%02d" "$total")
            for f in "${parts[@]}"; do
              nn="${f##*.part}"; nn="${nn%%.tar.gz}"
              mv "$f" "${base}.part${nn}-of-${total_padded}.tar.gz"
            done
            echo "$total" > "${base}.partcount"
          fi

          upload_files=$(ls -1 *.tar.gz *.partcount 2>/dev/null | tr '\n' ' ')
          echo "Files to upload: $upload_files"

          # Idempotent rebuild: drop any existing release/tag, recreate as prerelease.
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true
          gh release create "$TAG" \
            --prerelease \
            --title "$TAG" \
            --notes "**GPU Target**: ${{ matrix.gfx_target }}
          **vLLM Version**: ${{ needs.compute-meta.outputs.vllm_version }}
          **PyTorch Version**: ${{ needs.compute-meta.outputs.torch_version }}
          **Build Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          **Status**: prerelease — pending qualification.

          Portable vLLM build for ${{ matrix.gfx_target }}." \
            $upload_files

  # ======================================================================
  # Tier 1 + Tier 2 — hardware smoke + standalone inference on gfx1151.
  # Steps are report-only; the aggregate job makes the gate decision from
  # the emitted fragments, so every tier always runs and uploads.
  # ======================================================================
  hw-qualify:
    needs: [build-ubuntu, compute-meta]
    runs-on: [self-hosted, stx-halo, Linux]
    if: |
      always() &&
      needs.build-ubuntu.result == 'success' &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == null) ||
       github.event_name == 'schedule')
    env:
      CANDIDATE_TAG: vllm${{ needs.compute-meta.outputs.vllm_version }}-${{ needs.compute-meta.outputs.rocm }}-gfx1151
    steps:
      - uses: actions/checkout@v4
      - name: Download gfx1151 bundle
        uses: actions/download-artifact@v4
        with:
          name: vllm-ubuntu-rocm-gfx1151-x64
          path: ./vllm-install
      - name: Make bundle executable
        run: |
          chmod +x vllm-install/bin/vllm-server vllm-install/bin/python3* 2>/dev/null || true
          chmod +x vllm-install/lib/python3*/site-packages/_rocm_sdk_core/lib/llvm/bin/clang* 2>/dev/null || true
      - name: Tier 1 — hardware smoke
        run: |
          python3 scripts/qualify/tier1_smoke.py \
            --bundle-root ./vllm-install --gfx-target gfx1151 \
            --candidate-tag "$CANDIDATE_TAG" --output tier1-gfx1151.json
      - name: Tier 2 — standalone inference
        run: |
          export HF_HOME="${HF_HOME:-$RUNNER_TEMP/hf-cache}"
          python3 scripts/qualify/tier2_inference.py \
            --bundle-root ./vllm-install --gfx-target gfx1151 \
            --candidate-tag "$CANDIDATE_TAG" --logs-dir ./tier2-logs \
            --output tier2-gfx1151.json
      - name: Upload Tier 1 fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-report-gfx1151
          path: tier1-gfx1151.json
          if-no-files-found: warn
      - name: Upload Tier 2 fragment
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier2-report-gfx1151
          path: tier2-gfx1151.json
          if-no-files-found: warn
      - name: Upload Tier 2 server logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier2-logs-gfx1151
          path: tier2-logs/
          if-no-files-found: ignore
      - name: Cleanup
        if: always()
        run: |
          # vLLM child processes are titled "VLLM::EngineCore" etc., which a
          # "vllm.entrypoints" match misses — leaving an orphan holding VRAM and
          # causing spurious OOM in the next run. Sweep case-insensitively.
          pkill -9 -if "vllm|enginecore|resource_tracker" 2>/dev/null || true

  # ======================================================================
  # Tier 3 — lemonade integration. Defined as a reusable workflow in the
  # lemonade repo (single source of truth) and invoked here. It installs the
  # candidate prerelease through lemonade and runs validate_vllm.py.
  # NOTE: until the reusable workflow merges to lemonade's main, point the
  #       ref below at the lemonade branch that carries it.
  # ======================================================================
  tier3:
    needs: [compute-meta, publish-prerelease, hw-qualify]
    if: |
      always() &&
      needs.publish-prerelease.result == 'success' &&
      needs.hw-qualify.result == 'success'
    uses: lemonade-sdk/lemonade/.github/workflows/validate-vllm-reusable.yml@feat/vllm-qualification-reusable
    with:
      candidate_tag: vllm${{ needs.compute-meta.outputs.vllm_version }}-${{ needs.compute-meta.outputs.rocm }}-gfx1151
      lite: ${{ github.event_name == 'pull_request' }}
    secrets: inherit

  # ======================================================================
  # Aggregate per target: merge fragments → qualification record, decide
  # promotion (per-target gating), and promote prerelease → release on pass.
  # ======================================================================
  aggregate:
    needs: [prepare-matrix, compute-meta, build-ubuntu, publish-prerelease, hw-qualify, tier3]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    strategy:
      matrix: ${{fromJson(needs.prepare-matrix.outputs.ubuntu_matrix)}}
      fail-fast: false
    if: |
      always() &&
      needs.build-ubuntu.result == 'success' &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == null) ||
       github.event_name == 'schedule')
    env:
      TARGET: ${{ matrix.gfx_target }}
      CANDIDATE_TAG: vllm${{ needs.compute-meta.outputs.vllm_version }}-${{ needs.compute-meta.outputs.rocm }}-${{ matrix.gfx_target }}
    steps:
      - uses: actions/checkout@v4
      - name: Download all run artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./all-artifacts
      - name: Assemble fragments
        run: |
          mkdir -p frags
          cp "all-artifacts/tier0-report-${TARGET}/tier0-${TARGET}.json" frags/ 2>/dev/null || true
          if [ "$TARGET" = "gfx1151" ]; then
            cp "all-artifacts/tier1-report-gfx1151/tier1-gfx1151.json" frags/ 2>/dev/null || true
            cp "all-artifacts/tier2-report-gfx1151/tier2-gfx1151.json" frags/ 2>/dev/null || true
            VJSON=$(find all-artifacts -name 'vllm_validation_rocm.json' | head -1 || true)
            if [ -n "$VJSON" ]; then
              python3 scripts/qualify/tier3_from_validate.py \
                --validate-json "$VJSON" --gfx-target gfx1151 \
                --candidate-tag "$CANDIDATE_TAG" \
                --vllm-version "${{ needs.compute-meta.outputs.vllm_version }}" \
                --torch-version "${{ needs.compute-meta.outputs.torch_version }}" \
                --rocm-version "${{ needs.compute-meta.outputs.rocm }}" \
                --output frags/tier3-gfx1151.json
            fi
          fi
          echo "Fragments:"; ls -la frags/
      - name: Aggregate + decide promotion
        id: agg
        run: |
          if [ "$TARGET" = "gfx1151" ]; then
            REQUIRE="tier0,tier1,tier2,tier3"; HW="--hardware-validated"
          else
            REQUIRE="tier0"; HW=""
          fi
          python3 scripts/qualify/aggregate.py \
            --fragments-dir frags --gfx-target "$TARGET" \
            --candidate-tag "$CANDIDATE_TAG" --require-tiers "$REQUIRE" $HW \
            --output "qualification-${TARGET}.json"
      - name: Promote prerelease → release (on pass)
        if: steps.agg.outputs.promote == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          echo "Promoting ${CANDIDATE_TAG} to a full release"
          gh release edit "$CANDIDATE_TAG" --prerelease=false --latest
      - name: Upload qualification record
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: qualification-record-${{ matrix.gfx_target }}
          path: qualification-${{ matrix.gfx_target }}.json
          if-no-files-found: warn

  # ======================================================================
  # Append every qualification record to the durable JSONL ledger on the
  # orphan `build-results` branch (single job to avoid concurrent-push
  # races). This branch is the dashboard's data source.
  # ======================================================================
  ledger:
    needs: [aggregate]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    if: |
      always() &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Download qualification records
        uses: actions/download-artifact@v4
        with:
          pattern: qualification-record-*
          path: ./records
          merge-multiple: true
      - name: Append to ledger on build-results branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin build-results >/dev/null 2>&1; then
            git fetch origin build-results
            git checkout build-results
          else
            git checkout --orphan build-results
            git rm -rf . >/dev/null 2>&1 || true
          fi
          mkdir -p results
          touch results/ledger.jsonl
          shopt -s nullglob
          for rec in records/qualification-*.json; do
            python3 -c "import json,sys; print(json.dumps(json.load(open(sys.argv[1])), separators=(',',':')))" "$rec" >> results/ledger.jsonl
          done
          git add results/ledger.jsonl
          git commit -m "qualification ledger: run ${{ github.run_id }}" || { echo "nothing to commit"; exit 0; }
          git push origin build-results
