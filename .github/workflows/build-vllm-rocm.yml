name: Build vLLM + ROCm
on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'Build channel: stable (AMD matched set) or nightly (latest vLLM+ROCm)'
        required: false
        default: 'nightly'
        type: choice
        options: [nightly, stable]
      gfx_target:
        description: 'AMD GPU targets (comma-separated)'
        required: false
        default: 'gfx110X,gfx1151,gfx1150,gfx120X'
      create_release:
        description: 'Create a GitHub release after successful build'
        required: false
        default: true
        type: boolean

  pull_request:
    types: [opened, synchronize, reopened]

  schedule:
    - cron: '0 15 * * 0'

env:
  GFX_TARGETS: ${{ github.event.inputs.gfx_target || 'gfx110X,gfx1151,gfx1150,gfx120X' }}
  # Channel is a run-level parameter (not a matrix axis): stable and nightly
  # have different triggers and different upstream sources, so they run as
  # separate workflow runs. Scheduled runs default to nightly.
  CHANNEL: ${{ github.event.inputs.channel || 'nightly' }}

jobs:
  prepare-matrix:
    runs-on: ubuntu-22.04
    outputs:
      ubuntu_matrix: ${{ steps.set-matrix.outputs.ubuntu_matrix }}
    steps:
    - name: Set matrix
      id: set-matrix
      run: |
        targets="${{ env.GFX_TARGETS }}"
        matrix_targets=$(echo "$targets" \
          | tr ',' '\n' \
          | sed 's/^ *//;s/ *$//' \
          | jq -R . \
          | jq -s '{gfx_target: .}' \
          | jq -c)
        echo "ubuntu_matrix=$matrix_targets" >> $GITHUB_OUTPUT
        echo "Generated matrix: $matrix_targets"

  build-ubuntu:
    runs-on: ubuntu-22.04
    needs: prepare-matrix
    strategy:
      matrix: ${{fromJson(needs.prepare-matrix.outputs.ubuntu_matrix)}}
      fail-fast: false
    outputs:
      vllm_version: ${{ steps.set-outputs.outputs.vllm_version }}
      torch_version: ${{ steps.set-outputs.outputs.torch_version }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download portable Python 3.12 (python-build-standalone)
      run: |
        # Use astral-sh/python-build-standalone for a relocatable Python
        # that works across Linux distros without system Python dependency.
        PBS_TAG="20250604"
        PBS_URL="https://github.com/astral-sh/python-build-standalone/releases/download/${PBS_TAG}/cpython-3.12.11+${PBS_TAG}-x86_64-unknown-linux-gnu-install_only.tar.gz"
        echo "Downloading portable Python from $PBS_URL"
        # Extracts to python/ — move to /opt/vllm so it becomes the release root
        curl -fsSL "$PBS_URL" | tar -xz -C /opt
        mv /opt/python /opt/vllm
        /opt/vllm/bin/python3.12 --version
        echo "Portable Python installed at /opt/vllm"

    - name: Map GPU target to AMD wheel URLs
      id: wheel-urls
      run: |
        target="${{ matrix.gfx_target }}"

        # Map targets to AMD wheel URL suffixes
        # See: https://rocm.docs.amd.com/en/latest/rocm-for-ai/vllm.html
        case "$target" in
          gfx110X) suffix="gfx110X-all" ;;
          gfx1151) suffix="gfx1151" ;;
          gfx1150) suffix="gfx1150" ;;
          gfx120X) suffix="gfx120X-all" ;;
          *)
            echo "ERROR: No AMD pre-built wheels for target: $target"
            exit 1
            ;;
        esac

        echo "torch_index=https://repo.amd.com/rocm/whl/${suffix}/" >> $GITHUB_OUTPUT
        echo "vllm_index=https://rocm.frameworks.amd.com/whl/${suffix}/" >> $GITHUB_OUTPUT
        echo "Using PyTorch index: https://repo.amd.com/rocm/whl/${suffix}/"
        echo "Using vLLM index: https://rocm.frameworks.amd.com/whl/${suffix}/"

    - name: Prepare Python environment
      run: |
        # No venv needed — install packages directly into the standalone Python.
        /opt/vllm/bin/python3 -m pip install --upgrade pip
        echo "Python: $(/opt/vllm/bin/python3 --version)"

    - name: Install vLLM + PyTorch (channel=${{ env.CHANNEL }})
      run: |
        SP="/opt/vllm/lib/python3.12/site-packages"
        TORCH_INDEX="${{ steps.wheel-urls.outputs.torch_index }}"
        VLLM_INDEX="${{ steps.wheel-urls.outputs.vllm_index }}"

        if [ "$CHANNEL" = "stable" ]; then
          # STABLE: repackage AMD's own matched set. AMD's vLLM wheel declares
          # its AMD PyTorch dependency, so resolving everything from AMD indexes
          # yields a self-consistent set — no reinstall, no version pinning, no
          # ABI reconciliation. Pure repackage of what AMD published.
          echo "stable: installing AMD vLLM + matched AMD PyTorch"
          /opt/vllm/bin/pip install \
            --index-url "$VLLM_INDEX" \
            --extra-index-url "$TORCH_INDEX" \
            vllm torchvision
        else
          # NIGHTLY: latest vLLM (vLLM project) on the latest AMD ROCm PyTorch.
          # We deliberately compose newest + newest. If they are ABI-incompatible
          # (e.g. vllm0.21.0 wants c10::hip while the latest AMD torch exposes
          # c10::cuda) we do NOT pin around it — the qualification gate reports
          # nightly red and the release is blocked.
          echo "nightly: installing latest AMD PyTorch + latest vLLM (vllm.ai)"
          /opt/vllm/bin/pip install --index-url "$TORCH_INDEX" torch torchvision
          /opt/vllm/bin/pip install --extra-index-url https://wheels.vllm.ai/rocm/ vllm
          # vLLM pulled its own torch as a dependency; restore AMD's latest ROCm
          # torch (for the bundled ROCm SDK libs / amdsmi). No version pin.
          /opt/vllm/bin/pip install --force-reinstall --no-deps \
            --index-url "$TORCH_INDEX" torch
        fi

        # Use the AMD pip ROCm SDK amdsmi (_rocm_sdk_core/share/amd_smi) rather
        # than any amdsmi the wheels bundled.
        rm -rf $SP/amdsmi $SP/amdsmi-*.dist-info

        for libdir in $SP/_rocm_sdk_*/lib $SP/torch/lib; do
          [ -d "$libdir" ] && LD_LIBRARY_PATH="${libdir}:${LD_LIBRARY_PATH:-}"
        done
        export LD_LIBRARY_PATH
        # Report versions but DO NOT fail the build on a bad combination — a
        # broken bundle must still be packaged so the qualification gate can
        # detect and REPORT it. Fixing upstream is never our job.
        /opt/vllm/bin/python3 -c "
        import torch; print(f'PyTorch {torch.__version__}')
        import vllm; print(f'vLLM {vllm.__version__}')
        " || echo "WARNING: import check failed — qualification will report this"

    - name: Pre-compile Triton HIP utilities (eliminates gcc dependency)
      run: |
        SP="/opt/vllm/lib/python3.12/site-packages"
        TRITON_AMD="$SP/triton/backends/amd"
        for libdir in $SP/_rocm_sdk_*/lib $SP/torch/lib; do
          [ -d "$libdir" ] && LD_LIBRARY_PATH="${libdir}:${LD_LIBRARY_PATH:-}"
        done
        export LD_LIBRARY_PATH

        # Create unversioned symlinks for ROCm libs (pip installs only have versioned .so.N)
        ROCM_LIB="$SP/_rocm_sdk_core/lib"
        for lib in "$ROCM_LIB"/*.so.*; do
          name=$(basename "$lib")
          link="$ROCM_LIB/${name%%.*}.so"
          [ ! -e "$link" ] && ln -sf "$name" "$link"
        done
        ls -la "$ROCM_LIB/libamdhip64.so" || echo "WARNING: symlink not created"

        # Compile the hip_utils C module with gcc directly and save into the package.
        # We can't use Triton's compile_module_from_src because it also tries to
        # dlopen the HIP library, which doesn't work on headless CI.
        TRITON_AMD="$SP/triton/backends/amd"
        PYTHON_INC="/opt/vllm/include/python3.12"

        # Generate the C source with the HIP library path baked in
        /opt/vllm/bin/python3 -c "
        from pathlib import Path
        import os
        dirname = '$TRITON_AMD'
        src = Path(os.path.join(dirname, 'driver.c')).read_text()
        # Bake in the relative path that will resolve at runtime via LD_LIBRARY_PATH
        src = src.replace('/*py_libhip_search_path*/', 'libamdhip64.so', 1)
        Path('/tmp/hip_utils.c').write_text(src)
        print('Generated /tmp/hip_utils.c')
        "

        # Compile with gcc
        gcc /tmp/hip_utils.c -O3 -shared -fPIC -Wno-psabi \
          -o "$TRITON_AMD/hip_utils_prebuilt.so" \
          -I"$TRITON_AMD/include" \
          -I"$PYTHON_INC"
        echo "Pre-compiled: $TRITON_AMD/hip_utils_prebuilt.so ($(stat -c%s "$TRITON_AMD/hip_utils_prebuilt.so") bytes)"

        # Patch Triton to load the pre-built .so instead of JIT-compiling
        DRIVER_PY="$TRITON_AMD/driver.py"
        sed -i 's|mod = compile_module_from_src(src=src, name="hip_utils", include_dirs=include_dirs)|_pso = os.path.join(dirname, "hip_utils_prebuilt.so")\n        if os.path.exists(_pso):\n            import importlib.util as _ilu\n            _sp = _ilu.spec_from_file_location("hip_utils", _pso)\n            mod = _ilu.module_from_spec(_sp)\n            _sp.loader.exec_module(mod)\n        else:\n            mod = compile_module_from_src(src=src, name="hip_utils", include_dirs=include_dirs)|' "$DRIVER_PY"
        /opt/vllm/bin/python3 -c "import ast; ast.parse(open('$DRIVER_PY').read()); print('Patched driver.py — syntax OK')"

    - name: Create launcher script
      run: |
        cat > /opt/vllm/bin/vllm-server << 'LAUNCHER_EOF'
        #!/bin/bash
        SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
        VENV_DIR="$(dirname "$SCRIPT_DIR")"
        SP="$VENV_DIR/lib/python3.12/site-packages"
        # Add all bundled ROCm library paths
        for libdir in "$SP"/_rocm_sdk_*/lib "$SP"/torch/lib; do
        [ -d "$libdir" ] && LD_LIBRARY_PATH="${libdir}:${LD_LIBRARY_PATH:-}"
        done
        # Also add LLVM lib for the bundled clang
        LD_LIBRARY_PATH="$SP/_rocm_sdk_core/lib/llvm/lib:${LD_LIBRARY_PATH}"
        export LD_LIBRARY_PATH
        export PYTHONPATH="$SP/_rocm_sdk_core/share/amd_smi:${PYTHONPATH:-}"
        export FLASH_ATTENTION_TRITON_AMD_ENABLE=TRUE
        # Use bundled clang for Triton JIT (no system gcc needed)
        CLANG="$SP/_rocm_sdk_core/lib/llvm/bin/clang"
        [ -f "$CLANG" ] && chmod +x "$CLANG" "$CLANG"-22 2>/dev/null
        export CC="$CLANG"
        exec "$SCRIPT_DIR/python3" -m vllm.entrypoints.openai.api_server "$@"
        LAUNCHER_EOF

        # Remove YAML indentation from heredoc
        sed -i 's/^        //' /opt/vllm/bin/vllm-server
        chmod +x /opt/vllm/bin/vllm-server
        echo "Launcher script:"
        cat /opt/vllm/bin/vllm-server

    - name: Strip unnecessary files to reduce size
      run: |
        cd /opt/vllm
        echo "=== Size before cleanup ==="
        du -sh .

        SP="lib/python3.12/site-packages"

        # Remove pip/wheel (keep setuptools — torch.utils.cpp_extension needs it)
        rm -rf $SP/pip* $SP/wheel* 2>/dev/null || true

        # Remove __pycache__ and .pyc
        find . -type d -name "__pycache__" -exec rm -rf {} + 2>/dev/null || true
        find . -name "*.pyc" -delete 2>/dev/null || true

        # Remove test/benchmark dirs (but NOT torch.testing — it's imported at runtime)
        rm -rf $SP/torch/test $SP/torch/benchmarks 2>/dev/null || true

        # Remove packages not needed for inference serving (~500MB)
        rm -rf $SP/pyarrow* $SP/opencv* $SP/cv2* 2>/dev/null || true
        rm -rf $SP/onnx* $SP/pandas* $SP/plotly* 2>/dev/null || true
        rm -rf $SP/datasets* $SP/evaluate* $SP/peft* $SP/timm* 2>/dev/null || true
        rm -rf $SP/boto3* $SP/botocore* $SP/s3transfer* 2>/dev/null || true
        rm -rf $SP/azure* $SP/google_cloud* $SP/google_auth* $SP/msal* 2>/dev/null || true
        rm -rf $SP/tensorizer* $SP/runai* 2>/dev/null || true
        rm -rf $SP/aiter_meta* 2>/dev/null || true

        # Trim LLVM toolchain: keep only clang + its libs (~350MB saved)
        LLVM="$SP/_rocm_sdk_core/lib/llvm"
        # Keep only clang, clang-22, remove everything else from bin/
        find "$LLVM/bin" -type f ! -name "clang" ! -name "clang-22" -delete 2>/dev/null || true
        find "$LLVM/bin" -type l ! -name "clang" -delete 2>/dev/null || true
        # Keep only libs that clang needs (libclang-cpp, libLLVM, rocm_sysdeps)
        find "$LLVM/lib" -name "*.so*" \
          ! -name "libclang-cpp*" \
          ! -name "libLLVM*" \
          -delete 2>/dev/null || true
        rm -rf "$LLVM/lib/clang/22/include/cuda_wrappers" 2>/dev/null || true

        # Trim ROCm SDK bin/ (Python wrapper scripts, not needed)
        rm -rf "$SP/_rocm_sdk_core/bin" 2>/dev/null || true

        # Remove Python stdlib we don't need
        rm -rf lib/python3.12/test lib/python3.12/tkinter lib/python3.12/idlelib 2>/dev/null || true
        rm -rf lib/python3.12/turtledemo lib/python3.12/ensurepip 2>/dev/null || true
        # Keep include/ — Triton JIT needs Python.h headers

        # Ensure bundled clang is executable (permissions lost during tar)
        chmod +x "$LLVM/bin/clang"* 2>/dev/null || true

        # NOTE: Do NOT strip .so files — AMD ROCm wheels use special ELF
        # alignment that strip corrupts, and numpy/scipy also break.

        echo "=== Size after cleanup ==="
        du -sh .
        echo ""
        echo "Top consumers:"
        du -sh $SP/torch/ $SP/vllm/ $SP/_rocm_sdk_core/ $SP/aiter/ $SP/triton/ 2>/dev/null || true

    - name: Verify bundled environment works
      run: |
        SP="/opt/vllm/lib/python3.12/site-packages"
        for libdir in $SP/_rocm_sdk_*/lib $SP/torch/lib; do
          [ -d "$libdir" ] && LD_LIBRARY_PATH="${libdir}:${LD_LIBRARY_PATH:-}"
        done
        export LD_LIBRARY_PATH

        /opt/vllm/bin/python3 -c "import vllm; print(f'vLLM {vllm.__version__} OK')"
        /opt/vllm/bin/python3 -c "import torch; print(f'PyTorch {torch.__version__} OK')"
        /opt/vllm/bin/python3 -c "
        # Verify native extensions exist (they load only with GPU present)
        import os, pathlib
        sp = pathlib.Path('$SP/vllm')
        for ext in ['_C.abi3.so', '_rocm_C.abi3.so']:
            p = sp / ext
            assert p.exists(), f'Missing {ext}'
            print(f'{ext}: {p.stat().st_size // 1048576} MB')
        print('Native extensions verified')
        "
        bash -n /opt/vllm/bin/vllm-server
        echo "All sanity checks passed"

    - name: Report final size
      run: |
        echo "=== Final artifact ==="
        du -sh /opt/vllm/
        echo ""
        du -sh /opt/vllm/*/ 2>/dev/null

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: vllm-ubuntu-rocm-${{ matrix.gfx_target }}-x64
        path: /opt/vllm/
        retention-days: 30
        compression-level: 6

    - name: Set job outputs
      id: set-outputs
      run: |
        SP="/opt/vllm/lib/python3.12/site-packages"
        for libdir in $SP/_rocm_sdk_*/lib $SP/torch/lib; do
          [ -d "$libdir" ] && LD_LIBRARY_PATH="${libdir}:${LD_LIBRARY_PATH:-}"
        done
        export LD_LIBRARY_PATH

        vllm_ver=$(/opt/vllm/bin/python3 -c "import vllm; print(vllm.__version__)")
        torch_ver=$(/opt/vllm/bin/python3 -c "import torch; print(torch.__version__)")
        echo "vllm_version=$vllm_ver" >> $GITHUB_OUTPUT
        echo "torch_version=$torch_ver" >> $GITHUB_OUTPUT

    - name: Clean up
      if: always()
      run: |
        [ -d "/opt/vllm" ] && sudo rm -rf /opt/vllm

  # 15-test qualification on the self-hosted dev_lab box (ta-devlab-halo-02, 200 GB).
  # Runs the scripts/qualify harness against the built bundle:
  #   tier0 static (5) + tier1 hardware smoke (5) + tier2 functional inference (5)
  # = 15 tests, then aggregates them into a qualification report and a promotion
  # decision. Releases are gated on promotion (see create-release `needs`).
  qualify:
    needs: build-ubuntu
    runs-on: [self-hosted, Linux, ta-devlab-halo-02]
    env:
      GFX: gfx1151
    # Only on release builds. Skips PRs, dispatches with create_release=false,
    # and dispatches that didn't select gfx1151 (nothing to test → release ungated).
    if: >-
      github.event_name != 'pull_request' &&
      (
        github.event_name == 'schedule' ||
        (
          github.event_name == 'workflow_dispatch' &&
          (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == null) &&
          contains(github.event.inputs.gfx_target, 'gfx1151')
        )
      )
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download gfx1151 artifact
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        WORK="${{ runner.temp }}/vllm-qual"
        DEST="$WORK/vllm"
        ZIP="$WORK/artifact.zip"
        mkdir -p "$DEST"
        echo "=== Disk before download ==="; df -h "$WORK" || true

        # The build artifact is ~3.3 GB (extracts to ~11 GB). actions/download-artifact@v4
        # is unreliable for artifacts this size on self-hosted runners, so pull the
        # artifact zip directly with curl (streams to disk, resumable) and unzip it.
        # Resolve the artifact id via the REST API with curl + python3 — the box
        # does not have the gh CLI installed.
        ART_ID=$(curl -fsSL \
                   -H "Authorization: Bearer $GH_TOKEN" \
                   -H "Accept: application/vnd.github+json" \
                   "https://api.github.com/repos/${{ github.repository }}/actions/runs/${{ github.run_id }}/artifacts" \
                 | python3 -c "import sys,json; print(next((a['id'] for a in json.load(sys.stdin)['artifacts'] if a['name']=='vllm-ubuntu-rocm-gfx1151-x64'), ''))")
        [ -n "$ART_ID" ] || { echo "::error::gfx1151 artifact not found for this run"; exit 1; }
        echo "Artifact id: $ART_ID"

        avail_gb=$(df -BG --output=avail "$WORK" | tail -1 | tr -dc '0-9')
        echo "Available space: ${avail_gb} GB"
        if [ "${avail_gb:-0}" -lt 15 ]; then
          echo "::error::Only ${avail_gb} GB free on the runner; need ~15 GB for the 11 GB build."
          exit 1
        fi

        ok=0
        for attempt in 1 2 3; do
          echo "=== curl attempt $attempt ==="
          if curl -fL --retry 5 --retry-delay 10 --retry-all-errors -C - \
                  -H "Authorization: Bearer $GH_TOKEN" \
                  -H "Accept: application/vnd.github+json" \
                  -o "$ZIP" \
                  "https://api.github.com/repos/${{ github.repository }}/actions/artifacts/${ART_ID}/zip"; then
            ok=1; break
          fi
          echo "attempt $attempt failed; retrying in 15s"; sleep 15
        done
        [ "$ok" = "1" ] || { echo "::error::artifact zip download failed after 3 attempts"; df -h "$WORK" || true; exit 1; }
        echo "Downloaded zip: $(du -h "$ZIP" | cut -f1)"

        echo "=== Extracting ==="
        if command -v unzip >/dev/null 2>&1; then
          unzip -q -o "$ZIP" -d "$DEST"
        else
          python3 -m zipfile -e "$ZIP" "$DEST"
        fi
        rm -f "$ZIP"   # reclaim space immediately
        echo "Extracted $(du -sh "$DEST" | cut -f1) to $DEST"
        echo "=== Disk after extract ==="; df -h "$WORK" || true

    - name: Restore permissions and ROCm symlinks
      run: |
        # upload-artifact drops the +x bit and the unversioned .so symlinks the
        # build created, so rebuild both before running the harness.
        ROOT="${{ runner.temp }}/vllm-qual/vllm"
        SP="$ROOT/lib/python3.12/site-packages"
        chmod +x "$ROOT/bin/"* 2>/dev/null || true
        chmod +x "$SP/_rocm_sdk_core/lib/llvm/bin/"clang* 2>/dev/null || true
        ROCM_LIB="$SP/_rocm_sdk_core/lib"
        for lib in "$ROCM_LIB"/*.so.*; do
          [ -e "$lib" ] || continue
          name=$(basename "$lib"); link="$ROCM_LIB/${name%%.*}.so"
          # Use `if` (not `&&`) so a pre-existing symlink doesn't leave the loop
          # with exit 1 and trip `set -e`. The artifact preserves these symlinks,
          # so this is now mostly a defensive no-op.
          if [ ! -e "$link" ]; then ln -sf "$name" "$link"; fi
        done

    - name: Run 15-test qualification (tier0 + tier1 + tier2)
      id: qual
      run: |
        WORK="${{ runner.temp }}/vllm-qual"
        ROOT="$WORK/vllm"
        PY="$ROOT/bin/python3"
        FRAG="$WORK/fragments"; mkdir -p "$FRAG"
        Q="$GITHUB_WORKSPACE/scripts/qualify"
        TAG="vllm${{ needs.build-ubuntu.outputs.vllm_version }}-${GFX}"

        # The tiers are run WITHOUT --fail-on-error so all 15 tests execute and
        # emit a JSON fragment even when one fails; `aggregate --fail-on-no-promote`
        # is the single gate that decides pass/fail for the whole job.
        echo "::group::Tier 0 — static bundle verification (T0.1–T0.6)"
        "$PY" "$Q/tier0_static.py"   --bundle-root "$ROOT" --gfx-target "$GFX" \
            --channel "$CHANNEL" --candidate-tag "$TAG" --output "$FRAG/tier0-report.json" || true
        echo "::endgroup::"

        echo "::group::Tier 1 — hardware smoke (T1.1–T1.5)"
        "$PY" "$Q/tier1_smoke.py"    --bundle-root "$ROOT" --gfx-target "$GFX" \
            --channel "$CHANNEL" --candidate-tag "$TAG" --output "$FRAG/tier1-report.json" || true
        echo "::endgroup::"

        echo "::group::Tier 2 — functional inference (T2.1–T2.5)"
        "$PY" "$Q/tier2_inference.py" --bundle-root "$ROOT" --gfx-target "$GFX" \
            --channel "$CHANNEL" --candidate-tag "$TAG" \
            --model Qwen/Qwen2.5-0.5B-Instruct --logs-dir "$FRAG" \
            --output "$FRAG/tier2-report.json" || true
        echo "::endgroup::"

        echo "=== Aggregate fragments → qualification report (gates the job) ==="
        "$PY" "$Q/aggregate.py" --fragments-dir "$FRAG" --gfx-target "$GFX" \
            --channel "$CHANNEL" --candidate-tag "$TAG" \
            --require-tiers tier0,tier1,tier2 --hardware-validated \
            --output "$FRAG/qualification-report.json" \
            --fail-on-no-promote

    - name: Upload qualification report and fragments
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: qualification-gfx1151
        path: |
          ${{ runner.temp }}/vllm-qual/fragments/*.json
          ${{ runner.temp }}/vllm-qual/fragments/*.log
        if-no-files-found: warn

    - name: Tear down and clean up
      if: always()
      run: |
        # Free the GPU on this persistent runner no matter how the harness ended.
        WORK="${{ runner.temp }}/vllm-qual"
        pkill -9 -f "vllm.entrypoints.openai.api_server" 2>/dev/null || true
        rm -rf "$WORK" || true

  # Publish the qualification result (pass OR fail) to the qualification-data
  # branch so the external dashboard can poll it. Runs on a hosted runner (the
  # GPU box has no gh/git tooling). Contract: docs/qualification-feed.md.
  publish-qualification:
    needs: qualify
    if: always() && (needs.qualify.result == 'success' || needs.qualify.result == 'failure')
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
    - name: Checkout repository (for the publish script + schema doc)
      uses: actions/checkout@v4
      with:
        path: repo

    - name: Download qualification report
      uses: actions/download-artifact@v4
      with:
        name: qualification-gfx1151
        path: report

    - name: Publish to qualification-data branch
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        if [ ! -f report/qualification-report.json ]; then
          echo "::warning::no qualification-report.json in artifact; nothing to publish"
          exit 0
        fi
        git config --global user.name "github-actions[bot]"
        git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
        RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        BRANCH="qualification-data"

        # Race-safe: each attempt re-clones the latest branch, re-applies our
        # idempotent (build_id-keyed) upsert, and pushes; a rejected push (branch
        # moved under us) just retries on top of the new tip.
        pushed=0
        for attempt in 1 2 3 4 5; do
          rm -rf data
          if git clone --depth 1 --branch "$BRANCH" "$REPO_URL" data 2>/dev/null; then
            echo "cloned existing $BRANCH"
          else
            echo "creating orphan $BRANCH"
            git clone --depth 1 "$REPO_URL" data
            git -C data checkout --orphan "$BRANCH"
            git -C data rm -rf . >/dev/null 2>&1 || true
          fi

          python3 repo/scripts/publish_qualification.py \
            --report report/qualification-report.json \
            --data-dir data/qualification \
            --run-url "$RUN_URL"
          # Keep the contract doc alongside the data on the branch.
          cp repo/docs/qualification-feed.md data/qualification/SCHEMA.md

          git -C data add -A
          if git -C data diff --cached --quiet; then
            echo "no changes to publish"; pushed=1; break
          fi
          git -C data commit -q -m "qualification: run ${{ github.run_id }} (gfx1151)"
          if git -C data push origin "$BRANCH" 2>/dev/null; then
            pushed=1; break
          fi
          echo "push attempt $attempt failed (branch moved?); retrying"; sleep $((attempt * 3))
        done
        [ "$pushed" = 1 ] || { echo "::error::failed to publish after retries"; exit 1; }
        echo "Feed published:"
        echo "  https://raw.githubusercontent.com/${{ github.repository }}/${BRANCH}/qualification/index.json"

  create-release:
    needs: [prepare-matrix, build-ubuntu, qualify]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
      pull-requests: write
    strategy:
      matrix: ${{fromJson(needs.prepare-matrix.outputs.ubuntu_matrix)}}
      fail-fast: false
    if: |
      always() &&
      needs.build-ubuntu.result == 'success' &&
      (needs.qualify.result == 'success' || needs.qualify.result == 'skipped') &&
      github.event_name != 'pull_request' &&
      (github.event_name == 'workflow_dispatch' &&
       (github.event.inputs.create_release == 'true' || github.event.inputs.create_release == null) ||
       github.event_name == 'schedule')

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Download build artifact for ${{ matrix.gfx_target }}
      uses: actions/download-artifact@v4
      with:
        name: vllm-ubuntu-rocm-${{ matrix.gfx_target }}-x64
        path: ./artifact

    - name: Generate release tag
      id: generate-tag
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        VLLM_VERSION="${{ needs.build-ubuntu.outputs.vllm_version }}"
        TORCH_VERSION="${{ needs.build-ubuntu.outputs.torch_version }}"
        TARGET="${{ matrix.gfx_target }}"

        # Extract ROCm version from torch version string
        ROCM_VERSION=$(echo "$TORCH_VERSION" | grep -oP 'rocm[\d.]+' || echo "rocm")

        # Tag format: vllm{version}-{rocm_version}-{gfx_target}
        # e.g. vllm0.19.0-rocm7.12.0-gfx1150
        TAG="vllm${VLLM_VERSION}-${ROCM_VERSION}-${TARGET}"
        echo "tag=${TAG}" >> $GITHUB_OUTPUT
        echo "Generated release tag: ${TAG}"

    - name: Create archive (split if >1.9 GB for GitHub release limit)
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"
        MAX_SIZE=1900  # MB — GitHub limit is 2 GB per asset
        base="${TAG}-x64"

        echo "Creating: ${base}.tar.gz"
        tar -czf "${base}.tar.gz" -C ./artifact .
        size_mb=$(du -m "${base}.tar.gz" | cut -f1)
        echo "Archive size: ${size_mb} MB"

        if [ "$size_mb" -gt "$MAX_SIZE" ]; then
          echo "Splitting into ${MAX_SIZE}MB parts..."
          # 1-based, 2-digit numeric suffixes -> {base}.part01.tar.gz, ...
          split -b ${MAX_SIZE}M --numeric-suffixes=1 -a 2 \
            --additional-suffix=.tar.gz \
            "${base}.tar.gz" "${base}.part"
          rm "${base}.tar.gz"

          # Rename to HF-style partNN-of-MM.tar.gz, and emit a tiny manifest
          # ({base}.partcount, one line with MM) so consumers can determine
          # MM with a single HTTP GET instead of querying the GitHub Releases
          # API (which is rate-limited to 60 req/hr per IP unauthenticated).
          parts=( "${base}".part*.tar.gz )
          total=${#parts[@]}
          total_padded=$(printf "%02d" "$total")
          for f in "${parts[@]}"; do
            nn="${f##*.part}"; nn="${nn%%.tar.gz}"
            mv "$f" "${base}.part${nn}-of-${total_padded}.tar.gz"
          done
          echo "$total" > "${base}.partcount"

          echo "Parts created:"
          ls -la "${base}".part*
          echo "Manifest:"
          cat "${base}.partcount"
        fi

        echo "=== Release assets ==="
        ls -la *.tar.gz *.partcount 2>/dev/null || echo "No archives"

    - name: Create Release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"
        VLLM_VERSION="${{ needs.build-ubuntu.outputs.vllm_version }}"
        TORCH_VERSION="${{ needs.build-ubuntu.outputs.torch_version }}"
        TARGET="${{ matrix.gfx_target }}"

        upload_files=$(ls -1 *.tar.gz *.partcount 2>/dev/null | tr '\n' ' ')
        echo "Files to upload: $upload_files"

        # Delete existing release with same tag (idempotent rebuilds)
        gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

        gh release create "$TAG" \
          --title "$TAG" \
          --notes "**GPU Target**: $TARGET
        **vLLM Version**: $VLLM_VERSION
        **PyTorch Version**: $TORCH_VERSION
        **Build Date**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')

        Portable vLLM build for $TARGET. Includes bundled Python, PyTorch ROCm, and ROCm runtime. No separate installation required." \
          $upload_files

    - name: Attach qualification report to release (gfx1151)
      # Co-locate the qualification proof with the shippable artifact. gfx1151 is
      # the hardware-qualified target; best-effort so it never fails the release.
      if: matrix.gfx_target == 'gfx1151'
      continue-on-error: true
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        TAG="${{ steps.generate-tag.outputs.tag }}"
        rm -rf qual && mkdir -p qual
        if ! gh run download "${{ github.run_id }}" -n qualification-gfx1151 -D qual --repo "${{ github.repository }}"; then
          echo "::warning::qualification artifact not found; skipping attach"; exit 0
        fi
        if [ -f qual/qualification-report.json ]; then
          cp qual/qualification-report.json "qualification-report-${TAG}.json"
          gh release upload "$TAG" "qualification-report-${TAG}.json" --clobber
          echo "Attached qualification-report-${TAG}.json to $TAG"
        fi
